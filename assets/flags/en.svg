<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30">
  <defs>
    <clipPath id="a"><rect width="60" height="30"/></clipPath>
    <clipPath id="b"><polygon points="0,0 30,15 0,30"/></clipPath>
    <clipPath id="c"><polygon points="60,0 30,15 60,30"/></clipPath>
    <clipPath id="d"><polygon points="0,0 30,15 60,0"/></clipPath>
    <clipPath id="e"><polygon points="0,30 30,15 60,30"/></clipPath>
  </defs>
  <!-- Fond bleu -->
  <rect width="60" height="30" fill="#012169"/>
  <!-- Diagonales blanches (Saint-André) -->
  <path d="M0,0 L60,30 M60,0 L0,30" stroke="#FFFFFF" stroke-width="6" clip-path="url(#a)"/>
  <!-- Diagonales rouges décalées (Saint-Patrick) -->
  <path d="M0,0 L60,30" stroke="#C8102E" stroke-width="4" clip-path="url(#c)"/>
  <path d="M0,0 L60,30" stroke="#C8102E" stroke-width="4" clip-path="url(#b)"/>
  <path d="M60,0 L0,30" stroke="#C8102E" stroke-width="4" clip-path="url(#d)"/>
  <path d="M60,0 L0,30" stroke="#C8102E" stroke-width="4" clip-path="url(#e)"/>
  <!-- Croix blanche (Saint-Georges) -->
  <rect x="0" y="11" width="60" height="8" fill="#FFFFFF"/>
  <rect x="26" y="0" width="8" height="30" fill="#FFFFFF"/>
  <!-- Croix rouge (Saint-Georges) -->
  <rect x="0" y="13" width="60" height="4" fill="#C8102E"/>
  <rect x="28" y="0" width="4" height="30" fill="#C8102E"/>
</svg>
